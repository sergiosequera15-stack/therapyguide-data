name: Validate DATA

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify data module index
        run: python tools/validate_data_module_index.py

      - name: Verify data modules
        run: python tools/validate_data_modules.py

      - name: Generate beta-lactam allergy option candidates
        run: python tools/extract_betalactam_allergy_option_candidates.py

      - name: Build beta-lactam allergy curation worklist
        run: python tools/build_betalactam_allergy_curation_worklist.py

      - name: Validate beta-lactam allergy curation worklist
        run: python tools/validate_betalactam_allergy_curation_worklist.py

      - name: Generate beta-lactam allergy master table draft
        run: python tools/generate_betalactam_allergy_master_table.py

      - name: Validate beta-lactam allergy master table draft
        run: python tools/validate_betalactam_allergy_master_table.py

      - name: Build beta-lactam allergy consultant options
        run: python tools/build_betalactam_allergy_consultant.py

      - name: Validate beta-lactam allergy consultant
        run: python tools/validate_betalactam_allergy_consultant.py

      - name: Check beta-lactam allergy master table against current guide topics
        run: python tools/check_betalactam_allergy_master_table_sources.py

      - name: Build beta-lactam allergy source review queue
        run: python tools/build_betalactam_allergy_source_review_queue.py

      - name: Validate beta-lactam allergy source review queue
        run: python tools/validate_betalactam_allergy_source_review_queue.py

      - name: Audit beta-lactam allergy master table dose completeness
        run: python tools/check_betalactam_allergy_master_table_dose_completeness.py

      - name: Build beta-lactam allergy dose completion worklist
        run: python tools/build_betalactam_allergy_dose_completion_worklist.py

      - name: Validate beta-lactam allergy dose completion worklist
        run: python tools/validate_betalactam_allergy_dose_completion_worklist.py

      - name: Commit beta-lactam allergy generated artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/rules/betalactam_allergy_consultant.json \
            docs/rules/betalactam_allergy_options_candidate.json \
            docs/rules/betalactam_allergy_options_candidate_summary.json \
            docs/rules/betalactam_allergy_options_curation_worklist.json \
            docs/rules/betalactam_allergy_options_master_table_draft.json \
            docs/rules/generated/betalactam_allergy_master_table_source_check_report.json \
            docs/rules/generated/betalactam_allergy_master_table_source_check_summary.json \
            docs/rules/betalactam_allergy_master_table_manual_review_queue.json \
            docs/rules/generated/betalactam_allergy_master_table_dose_completeness_report.json \
            docs/rules/generated/betalactam_allergy_master_table_dose_completeness_summary.json \
            docs/rules/betalactam_allergy_dose_completion_worklist.json
          if git diff --cached --quiet; then
            echo "No beta-lactam allergy generated artifact changes to commit."
            exit 0
          fi
          git commit -m "Update beta-lactam allergy generated artifacts"
          git push

      - name: Ensure generated enterobacteria artifacts are not committed
        run: |
          if [ -f docs/microbiology/preconsolidation_enterobacterias_draft_2025.json ]; then
            echo "Generated preconsolidation draft must remain a temporary artifact, not a committed DATA file."
            exit 1
          fi
          if [ -f docs/microbiology/consolidated_enterobacterias_candidate_2025.json ]; then
            echo "Generated consolidated candidate must remain a temporary artifact, not a committed DATA file."
            exit 1
          fi
          if [ -f docs/microbiology/published_dry_run/huvn_enterobacterias_2025.json ]; then
            echo "Generated dry-run published map must remain a temporary artifact, not a committed DATA file."
            exit 1
          fi

      - name: Generate enterobacteria preconsolidation draft
        run: python tools/generate_enterobacteria_preconsolidation.py

      - name: Validate pending microbiology table extractions
        run: python tools/validate_microbiology_pending_tables.py

      - name: Validate existing published microbiology maps
        run: python tools/validate_published_microbiology_maps.py

      - name: Dry-run promote enterobacteria annual map
        run: |
          python tools/promote_enterobacteria_candidate.py \
            --candidate docs/microbiology/consolidated_enterobacterias_candidate_2025.json \
            --output docs/microbiology/published_dry_run/huvn_enterobacterias_2025.json \
            --reviewer "CI dry-run" \
            --reviewed-at "$(date -u +%F)" \
            --review-notes "Dry-run promotion generated by CI; not a manual publication." \
            --accept-low-count-warnings \
            --accept-excluded-conflicts \
            --approve-publication

      - name: Validate dry-run promoted enterobacteria annual map
        run: python tools/validate_published_microbiology_maps.py --map-file docs/microbiology/published_dry_run/huvn_enterobacterias_2025.json

      - name: Validate published microbiology maps after dry-run
        run: python tools/validate_published_microbiology_maps.py

      - name: Upload beta-lactam allergy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: betalactam-allergy-artifacts
          path: |
            docs/rules/betalactam_allergy_consultant.json
            docs/rules/betalactam_allergy_options_candidate.json
            docs/rules/betalactam_allergy_options_candidate_summary.json
            docs/rules/betalactam_allergy_options_curation_worklist.json
            docs/rules/betalactam_allergy_options_master_table_draft.json
            docs/rules/generated/betalactam_allergy_master_table_source_check_report.json
            docs/rules/generated/betalactam_allergy_master_table_source_check_summary.json
            docs/rules/betalactam_allergy_master_table_manual_review_queue.json
            docs/rules/generated/betalactam_allergy_master_table_dose_completeness_report.json
            docs/rules/generated/betalactam_allergy_master_table_dose_completeness_summary.json
            docs/rules/betalactam_allergy_dose_completion_worklist.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload enterobacteria preconsolidation draft
        uses: actions/upload-artifact@v4
        with:
          name: enterobacteria-preconsolidation-draft-2025
          path: docs/microbiology/preconsolidation_enterobacterias_draft_2025.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload enterobacteria consolidated candidate
        uses: actions/upload-artifact@v4
        with:
          name: enterobacteria-consolidated-candidate-2025
          path: docs/microbiology/consolidated_enterobacterias_candidate_2025.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload enterobacteria dry-run annual map
        uses: actions/upload-artifact@v4
        with:
          name: enterobacteria-dry-run-annual-map-2025
          path: docs/microbiology/published_dry_run/huvn_enterobacterias_2025.json
          if-no-files-found: error
          retention-days: 30
