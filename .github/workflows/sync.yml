name: Sync HUVN Guide Data

on:
  workflow_dispatch:
  schedule:
    # The microbiology map is annual; scheduled DATA refresh is intentionally conservative.
    # Manual workflow_dispatch remains available for urgent guide/data updates.
    - cron: "0 5 1 1,7 *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run HUVN guide sync script
        run: python tools/sync_huvn_guide.py

      - name: Enrich resource metadata
        run: python tools/enrich_resources.py

      - name: Build microbiology 2025 module
        run: python tools/build_microbiology_2025.py

      - name: Publish data module manifest
        run: python tools/update_data_module_manifest.py

      - name: Verify structured guide data
        run: |
          python <<'PY'
          import json
          import sys
          from pathlib import Path

          manifest_path = Path("docs/manifest.json")
          topics_path = Path("docs/guide_topics.json")

          if not manifest_path.exists():
              sys.exit("ERROR: docs/manifest.json does not exist")

          if not topics_path.exists():
              sys.exit("ERROR: docs/guide_topics.json does not exist")

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          topics = json.loads(topics_path.read_text(encoding="utf-8"))

          if manifest.get("version") != 2:
              sys.exit(f"ERROR: manifest version is {manifest.get('version')}, expected 2")

          if "contentBlockCount" not in manifest:
              sys.exit("ERROR: manifest lacks contentBlockCount")

          if "tableBlockCount" not in manifest:
              sys.exit("ERROR: manifest lacks tableBlockCount")

          if manifest.get("resourceHashAlgorithm") != "sha256":
              sys.exit("ERROR: manifest lacks SHA-256 resource hash metadata")

          if manifest.get("topicCount") != len(topics):
              sys.exit(
                  f"ERROR: manifest topicCount {manifest.get('topicCount')} "
                  f"does not match topics length {len(topics)}"
              )

          missing = [topic.get("id") for topic in topics if "contentBlocks" not in topic]
          if missing:
              sys.exit(f"ERROR: topics without contentBlocks: {missing[:5]}")

          total_blocks = sum(len(topic.get("contentBlocks", [])) for topic in topics)
          table_blocks = sum(
              1
              for topic in topics
              for block in topic.get("contentBlocks", [])
              if block.get("type") == "table"
          )

          if total_blocks == 0:
              sys.exit("ERROR: no contentBlocks generated")

          if manifest.get("contentBlockCount") != total_blocks:
              sys.exit(
                  f"ERROR: manifest contentBlockCount {manifest.get('contentBlockCount')} "
                  f"does not match computed {total_blocks}"
              )

          if manifest.get("tableBlockCount") != table_blocks:
              sys.exit(
                  f"ERROR: manifest tableBlockCount {manifest.get('tableBlockCount')} "
                  f"does not match computed {table_blocks}"
              )

          downloaded_resources = [
              resource
              for resource in manifest.get("globalResources", [])
              if resource.get("downloaded")
          ]

          missing_hash = [
              resource.get("title") or resource.get("url")
              for resource in downloaded_resources
              if not resource.get("sha256") or not resource.get("version")
          ]

          if missing_hash:
              sys.exit(f"ERROR: downloaded resources without hash metadata: {missing_hash[:5]}")

          if "dataModules" not in manifest:
              sys.exit("ERROR: manifest lacks dataModules")

          print(f"Structured topics OK: {len(topics)} topics")
          print(f"Content blocks: {total_blocks}")
          print(f"Table blocks: {table_blocks}")
          print(f"Downloaded resources with SHA-256: {len(downloaded_resources)}")
          print("Data modules published in manifest")
          PY

      - name: Verify data modules
        run: python tools/validate_data_modules.py

      - name: Validate pending microbiology table extractions
        run: python tools/validate_microbiology_pending_tables.py

      - name: Consolidate enterobacteria pending extraction and QA
        run: python tools/consolidate_enterobacteria_pending.py

      - name: Commit generated guide data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update generated HUVN guide data" || echo "No changes to commit"
          git push
